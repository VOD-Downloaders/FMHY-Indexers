name: Indexer Issue
description: An issue with an indexer specification
title: "[Issue] XYZ"
labels: ["indexer-health"]
assignees:
  - ggjorven
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "Indexer XYZ stopped working!"
    validations:
      required: true
  - type: textarea
    id: how-to-fix
    attributes:
      label: How to fix this?
      description: If you know, please explain how to fix the issue with the indexer.
      placeholder: Tell us how to fix this (if you can).
