name: Check indexers

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  INDEXERS_PATTERN: v0.1/*.json
  INDEXERS_REPORT: indexers_report.md
  INDEXERS_TITLE: indexers_title.txt
  PR_REPORT: pullrequest_report.md
  PR_TITLE: pullrequest_title.txt

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install requests

      - name: Run detection script
        run: python scripts/check_indexers.py

      - name: Open issue (if necessary)
        if: hashFiles(env.INDEXERS_REPORT) != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title=$(cat "$INDEXERS_TITLE")
          existing=$(gh issue list --state open --label automated-indexer-health --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title"
            gh issue comment "$existing" --body-file "$INDEXERS_REPORT"
            echo "Updated issue #$existing"
          else
            gh issue create --title "$title" --label indexer-health --body-file "$INDEXERS_REPORT"
            echo "Opened issue: $title"
          fi

      - name: Load PR title
        id: prtitle
        run: echo "title=$(cat "$PR_TITLE")" >> "$GITHUB_OUTPUT"

      - name: Open PR (if necessary)
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-indexers
          title: ${{ steps.prtitle.outputs.title }}
          commit-message: "Update redirected indexer domains"
          add-paths: ${{ env.INDEXERS_PATTERN }}
          body-path: ${{ env.PR_REPORT }}
          delete-branch: true
